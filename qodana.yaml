# Qodana for .NET — full linter (stable, non-EAP), free under
# Qodana Cloud's Community plan (private repos + commercial use OK).
#
# Adoption notes (chore/qodana-adopt):
#   - Baseline lives in qodana.sarif.json; new PRs are graded against
#     it and only NEW findings beyond the baseline fail the build.
#     Originally 320 findings at adoption; refreshed periodically as
#     burndown PRs reduce the count (most recent refresh: 138).
#   - UnusedAutoPropertyAccessor.{Global,Local} disabled outright —
#     ~684 hits on DTO records that EF/the mediator instantiate via
#     reflection. Qodana can't see those callsites; the noise drowns
#     real findings.
#   - CSharpWarnings__CS8981 scoped to the Migrations directory
#     only — fires on EF-Core-generated migration class names
#     (lower-case ASCII only). Migrations are immutable once
#     applied to staging/prod (CLAUDE.md §9), so renaming is not
#     an option. Already in Directory.Build.props
#     `WarningsNotAsErrors`. Path-scoping (instead of a global
#     name exclusion) keeps the rule active for application code,
#     so a hand-written class with a lowercase-only name still
#     gets flagged.
#   - NotAccessedPositionalProperty.Global disabled — fires on record
#     positional properties that are never read in C# code, but our
#     DTOs (PagedResult, BasketItemDto, RestaurantInfoDto, etc.) are
#     consumed by the Next.js frontend over HTTP/JSON. Same blind-spot
#     as UnusedAutoPropertyAccessor: Qodana doesn't follow JSON
#     ser/deser into the frontend repo. Verified each flagged property
#     IS consumed in frontend/src/types/*.ts and components — removing
#     would break the wire format. Confirmed via frontend grep on
#     2026-05-08.
#   - UnusedTypeParameter disabled — fires on the marker interfaces
#     `ICommand<TResult>` and `IQuery<TResult>` because `TResult`
#     isn't used inside the interface body. It's load-bearing
#     elsewhere: the custom mediator (CLAUDE.md §3) extracts
#     `TResult` from the closed generic via reflection at dispatch
#     time. Removing it would break the mediator entirely.

version: "1.0"
linter: jetbrains/qodana-dotnet:2026.1

profile:
  name: qodana.starter

dotnet:
  solution: RestaurantSystem.sln

# Note: the baseline is wired via the workflow's `args: --baseline,...`
# input, not here — `baseline` is a CLI/action parameter, not a
# qodana.yaml config key (Qodana 2026.1 rejects it with "Unexpected
# keys in qodana.yaml").

exclude:
  - name: UnusedAutoPropertyAccessor.Global
  - name: UnusedAutoPropertyAccessor.Local
  - name: CSharpWarnings__CS8981
    paths:
      - RestaurantSystem.Infrastructure/Persistence/Migrations
  - name: NotAccessedPositionalProperty.Global
  - name: UnusedTypeParameter

# Block on any NEW finding (anything not in the baseline). Existing
# baselined items remain reported but don't fail the build — drive
# them down over time.
failureConditions:
  severityThresholds:
    any: 0
