name: Qodana

# Spike: per-PR static analysis via Qodana for .NET. Free alternative
# to SonarQube (Community Edition only analyzes main on private repos;
# doesn't fit our per-PR need).
#
# Using the stable `jetbrains/qodana-dotnet:2026.1` image (configured
# via qodana.yaml) instead of the Community .NET linter — the Community
# image has been EAP-only for 2+ years and its bundled ReSharper C++
# RC expires every ~2 months. Stable image + Cloud token is the
# pragmatic path; token is free under Qodana Cloud's Community plan.
#
# Triggers:
#   - PR against main/develop  → diff-only "PR mode" scan
#   - push to main/develop     → full-repo scan
#   - workflow_dispatch        → manual full-repo scan (useful for
#                                baseline / on-demand audits)
#
# Security: this workflow uses no untrusted-input expressions in run:
# commands; only static literals + secrets.QODANA_TOKEN +
# secrets.GITHUB_TOKEN + github.event_name (string-typed, safe).
# Action is SHA-pinned per our hardening policy.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: qodana-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write   # PR comment summary
  checks: write          # GitHub Checks API; the action otherwise truncates output to 10/level

jobs:
  qodana:
    name: Qodana (.NET)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Non-blocking during the spike. Once the baseline is understood
    # and we know the false-positive rate on this codebase, flip to
    # blocking by removing this line and tightening qodana.yaml's
    # failureConditions.
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Qodana wants full history to compute baseline diffs.
          fetch-depth: 0
      - name: Qodana scan
        uses: JetBrains/qodana-action@d7b5ec2fbec32197ef447c450e00589ed5f34fd5 # v2026.1
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        with:
          # Skip SARIF upload to GitHub Code Scanning — that needs
          # Advanced Security on private repos, which we don't have
          # on the free tier. Results still flow to Qodana Cloud
          # (paired with QODANA_TOKEN) and as a PR comment.
          upload-result: false
          use-caches: true
          post-pr-comment: ${{ github.event_name == 'pull_request' }}

      # Spike-only: upload the SARIF as a GHA artifact so we can pull
      # it down and commit it as the baseline file when adopting Qodana.
      # This step is removed in the eventual adopt PR.
      - name: Upload SARIF (for baselining)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: qodana-sarif
          path: ${{ runner.temp }}/qodana/results/qodana.sarif.json
          if-no-files-found: warn
