name: Qodana

# Per-PR static analysis via Qodana for .NET. Free alternative to
# SonarQube (Community Edition only analyzes main on private repos;
# doesn't fit our per-PR need).
#
# Using the stable `jetbrains/qodana-dotnet:2026.1` image (configured
# via qodana.yaml) instead of the Community .NET linter — the Community
# image has been EAP-only for 2+ years and its bundled ReSharper C++
# RC expires every ~2 months. Stable image + Cloud token is the
# pragmatic path; token is free under Qodana Cloud's Community plan.
#
# Triggers:
#   - PR against main/develop  → diff-only "PR mode" scan (vs baseline)
#   - push to main/develop     → full-repo scan (vs baseline)
#   - workflow_dispatch        → manual scan; on-demand audits, and the
#                                re-baseline flow (see below)
#
# Baseline: qodana.sarif.json at repo root holds the known findings.
# Only NEW problems beyond the baseline fail the build.
#
# Re-baselining: run this workflow via the Actions tab (workflow_dispatch)
# with the `rebaseline` input checked. That runs a FULL scan with no
# baseline and a disabled fail-threshold, so the run stays green and the
# produced SARIF captures ALL current findings. The SARIF is uploaded as
# the `qodana-rebaseline-sarif` artifact — download it and commit it as
# qodana.sarif.json in a separate chore PR. (Without this mode, a dispatch
# run compares against the stale baseline, fails on failThreshold, and
# emits no committable artifact — see issue #38.)
#
# Security: this workflow uses no untrusted-input expressions in run:
# commands; only static literals + secrets.QODANA_TOKEN +
# secrets.GITHUB_TOKEN + github.event_name (string-typed, safe).
# Action is SHA-pinned per our hardening policy.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      rebaseline:
        description: 'Re-baseline: full scan, no baseline, never fails; uploads fresh SARIF artifact to commit as qodana.sarif.json'
        type: boolean
        default: false

concurrency:
  group: qodana-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write   # PR comment summary
  checks: write          # GitHub Checks API; the action otherwise truncates output to 10/level

jobs:
  qodana:
    name: Qodana (.NET)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Qodana wants full history to compute baseline diffs.
          fetch-depth: 0
      - name: Qodana scan
        uses: JetBrains/qodana-action@d7b5ec2fbec32197ef447c450e00589ed5f34fd5 # v2026.1
        # Re-baseline runs must stay green even though the full scan trips the
        # quality gate (qodana.yaml severityThresholds.any: 0 is a separate
        # gate from --fail-threshold, so the threshold alone can't be relied on).
        # continue-on-error keeps the job green in re-baseline mode only; normal
        # runs (false) still fail on new findings as before.
        continue-on-error: ${{ github.event_name == 'workflow_dispatch' && inputs.rebaseline }}
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        with:
          # Skip SARIF upload to GitHub Code Scanning — that needs
          # Advanced Security on private repos, which we don't have
          # on the free tier. Results still flow to Qodana Cloud
          # (paired with QODANA_TOKEN) and as a PR comment.
          upload-result: false
          use-caches: true
          post-pr-comment: ${{ github.event_name == 'pull_request' }}
          # Normal mode: compare against the in-repo baseline (qodana.sarif.json)
          # so only NEW findings fail the build. Passed as CLI args because
          # `baseline` is not a qodana.yaml key.
          # Re-baseline mode (workflow_dispatch + rebaseline input): no baseline
          # and a disabled fail-threshold, so a full scan records ALL findings
          # and the run stays green; the resulting SARIF is uploaded below.
          args: ${{ (github.event_name == 'workflow_dispatch' && inputs.rebaseline) && '--fail-threshold,1000000' || '--baseline,qodana.sarif.json' }}
      - name: Upload fresh baseline SARIF (re-baseline mode only)
        # !cancelled() so the SARIF is still captured even if the scan step
        # reports failure (belt-and-suspenders alongside continue-on-error above).
        if: ${{ !cancelled() && github.event_name == 'workflow_dispatch' && inputs.rebaseline }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: qodana-rebaseline-sarif
          path: ${{ runner.temp }}/qodana/results/qodana.sarif.json
          if-no-files-found: error
