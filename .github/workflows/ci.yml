name: CI

# Ported from .gitlab-ci.yml + 2026-05-05 hardening (DeelMarkt-borrowed:
# OSV-Scanner, TruffleHog alongside gitleaks, Trivy filesystem scan,
# SHA-pinned actions, concurrency cancellation, timeout caps).
#
# Out-of-scope: build_image / trivy image — those reintroduce when the
# new deploy strategy lands. Image-pushing does NOT happen here today.
#
# Security: this workflow uses no untrusted-input expressions
# (PR title/body/branch/commit) in run: commands. All inputs are
# either secrets.GITHUB_TOKEN or static literals. All third-party
# actions are pinned to immutable SHAs.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel stale runs when a new push lands on the same PR — saves
# free-tier Actions minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dotnet_format:
    name: dotnet format --verify-no-changes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: dotnet format RestaurantSystem.sln --verify-no-changes --no-restore --severity warn

  file_length:
    name: file-length (CLAUDE.md §4)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: bash scripts/check-file-length.sh --all

  dotnet_build_strict:
    name: dotnet build (warnings as errors)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: dotnet build RestaurantSystem.sln --nologo --verbosity minimal /p:TreatWarningsAsErrors=true

  dotnet_test:
    name: dotnet test (integration)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: restaurant_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      INTEGRATION_TESTS_DB_CONNECTION: "Host=postgres;Port=5432;Database=restaurant_test;Username=test;Password=test"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run integration tests
        run: |
          dotnet test RestaurantSystem.IntegrationTests/RestaurantSystem.IntegrationTests.csproj \
            --nologo --verbosity minimal \
            --logger "junit;LogFileName=test-results.xml" \
            --results-directory test-results \
            -p:CollectCoverage=true \
            -p:CoverletOutputFormat=cobertura \
            -p:CoverletOutput=test-results/coverage.cobertura.xml
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: test-results
          path: test-results/

  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xzf - -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
      - name: Run gitleaks
        run: gitleaks detect --verbose --redact --source .

  trufflehog:
    name: TruffleHog (secret scan, complementary to gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only run on PRs — TruffleHog's diff-scan needs BASE != HEAD.
    # On a push to main/develop, BASE (default branch) == HEAD, which
    # the action errors on. Gitleaks already does the full-filesystem
    # secret scan on every push, so coverage doesn't regress.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@cb6aeefd6e2498240d0418e63f69684d28337e7b # v3.91.0
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

  trivy_fs:
    name: Trivy filesystem (misconfig + secrets)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

  license_compliance:
    name: license-compliance (transitive NuGet)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Mirrors trivy_fs / gitleaks: SHA-pinned checkout, capped timeout,
    # concurrency cancellation (inherited from top-level `concurrency`).
    #
    # Fails the build if any restored NuGet package (direct OR transitive)
    # carries a license outside the allowlist at repo-root
    # `LICENSES.allowlist`.
    #
    # To add a license: see the header in `LICENSES.allowlist`. Adding a
    # license is intentionally a code change so the diff is auditable.
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install nuget-license (pinned)
        # Install to /usr/local/bin (on PATH by default) — `--global`
        # would land it under ~/.dotnet/tools which isn't on PATH inside
        # this container, and per-step `export PATH=` doesn't carry to
        # subsequent `run:` blocks.
        run: dotnet tool install --tool-path /usr/local/bin nuget-license --version 4.0.0
      - name: Restore NuGet packages
        run: dotnet restore RestaurantSystem.sln --verbosity minimal
      - name: Build allowlist (strip comments, emit JSON array)
        # nuget-license v4 expects the --allowed-license-types file as
        # a JSON array. The repo-tracked LICENSES.allowlist is kept in
        # the human-friendly one-per-line + `#` comments format; convert
        # to JSON here so the tracked file stays reviewable. Using awk
        # (always present) instead of jq (not in the .NET SDK image).
        run: |
          awk 'BEGIN{printf "["} /^[^#]/ && NF {printf "%s\"%s\"", sep, $0; sep=","} END{printf "]\n"}' \
            LICENSES.allowlist > /tmp/licenses-allowed.json
          echo "Allowed license types:"
          cat /tmp/licenses-allowed.json
      - name: Scan licenses
        # JsonPretty output makes the failure reviewable (Table format
        # embeds the full license body of any non-SPDX package and
        # blows the log out to >1MB on a single line).
        # --licenseurl-to-license-mappings maps non-SPDX license URLs
        # (older Microsoft.AspNetCore packages declare their license as
        # a raw GitHub URL rather than SPDX) to the actual SPDX type.
        run: |
          # Ignored packages: build-time-only Microsoft tooling that
          # ships its license as an embedded file the tool can't classify.
          # The exclude list is reviewable in LICENSES.ignored.txt
          # (one package ID per line, comments + blanks stripped here).
          ignored=$(grep -vE '^\s*(#|$)' LICENSES.ignored.txt | paste -sd, -)
          echo "Ignored packages: $ignored"
          nuget-license \
            -i RestaurantSystem.sln \
            -a /tmp/licenses-allowed.json \
            --licenseurl-to-license-mappings LICENSES.urlmap.json \
            --ignored-packages "$ignored" \
            -o JsonPretty

  osv_scanner:
    name: OSV-Scanner (dependency CVEs)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Non-blocking initially — same pattern as frontend so the migration
    # PR can land. Tighten once the baseline NuGet dep tree is verified
    # clean against the OSV database.
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: google/osv-scanner-action/osv-scanner-action@6fc714450122bda9d00e4ad5d639ad6a39eedb1f # v2.0.1
        with:
          scan-args: |-
            --recursive .
            --format=table
