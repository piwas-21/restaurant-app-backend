name: build-image

# Builds and pushes the API container image to GHCR. Reintroduces the
# image-build step ci.yml deferred ("reintroduce when the new deploy
# strategy lands") — the single-box Docker Compose deploy pulls
# ghcr.io/piwas-21/restaurant-app-backend. See
# ../../docs (workspace): docs/plans/HETZNER-MIGRATION-PLAN.md.
#
# Security: no untrusted-input expressions (PR title/body/branch) in any
# run: step; all third-party actions pinned to immutable SHAs; the token
# is the workflow-scoped GITHUB_TOKEN with packages:write only.

on:
  push:
    branches: [main, develop]   # builds on develop too (dry-run); :latest only tagged on the default branch (main)
    tags: ['v*']

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: build & push (GHCR)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: buildmeta
        # ISO-8601 UTC build timestamp, baked into the image alongside the commit
        # SHA. github.sha is the trusted 40-hex commit; both are safe (no untrusted
        # PR-controlled input) per this workflow's security note.
        run: echo "time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
            type=ref,event=tag

      - uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ steps.buildmeta.outputs.time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
