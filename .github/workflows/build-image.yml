name: build-image

# Builds and pushes the API container image to GHCR. Reintroduces the
# image-build step ci.yml deferred ("reintroduce when the new deploy
# strategy lands") — the single-box Docker Compose deploy pulls
# ghcr.io/piwas-21/restaurant-app-backend. See
# ../../docs (workspace): docs/plans/HETZNER-MIGRATION-PLAN.md.
#
# Security: no untrusted-input expressions (PR title/body/branch) in any
# run: step; all third-party actions pinned to immutable SHAs; the token
# is the workflow-scoped GITHUB_TOKEN with packages:write only.

on:
  push:
    branches: [main, develop]   # builds on develop too (dry-run); :latest only tagged on the default branch (main)
    tags: ['v*']

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: build & push (GHCR)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
            type=ref,event=tag

      - uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Auto-deploy to the single-box prod stack (Netcup) once :latest is published.
  # Only on main (the deploy pulls :latest, which is tagged on the default branch
  # only). SSHes into the box and runs the existing /opt/rumi/deploy/deploy.sh,
  # which `compose pull`s BOTH repos' :latest images and restarts the stack — so
  # a merge to either repo rolls the whole stack forward.
  #
  # Requires repo (or org) secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY
  # (private key whose public half is in rumi@box:~/.ssh/authorized_keys),
  # DEPLOY_SSH_FINGERPRINT (the box host key, to pin against MITM). The deploy
  # user needs passwordless sudo for the chown in deploy.sh. See deploy/README.md.
  deploy:
    name: deploy (prod box)
    needs: build-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Serialize deploys triggered within this repo. Cross-repo races (frontend
    # deploying at the same moment) are handled by the flock in the remote
    # script — GitHub concurrency groups don't span repositories.
    concurrency:
      group: prod-deploy
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - name: SSH → pull latest images and restart the stack
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          fingerprint: ${{ secrets.DEPLOY_SSH_FINGERPRINT }}
          command_timeout: 18m
          script: |
            flock -n /tmp/rumi-deploy.lock -c 'cd /opt/rumi/deploy && ./deploy.sh' \
              || { echo "::error::another RUMI deploy holds the lock; skipping this run"; exit 1; }
