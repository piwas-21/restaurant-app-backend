apiVersion: v1
kind: Namespace
metadata:
  name: rumi-test
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rumi-app-config
  namespace: rumi-test
data:
  NODE_ENV: "production"
  PORT: "3000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rumi-restaurant-web
  namespace: rumi-test
  labels:
    app: rumi-restaurant-web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: rumi-restaurant-web
  template:
    metadata:
      labels:
        app: rumi-restaurant-web
    spec:
      containers:
      - name: rumi-restaurant
        image: mahmutkaya/rumi-restaurant-web:amd64
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          protocol: TCP
        envFrom:
        - configMapRef:
            name: rumi-app-config
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: rumi-restaurant-web
  namespace: rumi-test
  labels:
    app: rumi-restaurant-web
spec:
  type: LoadBalancer
  selector:
    app: rumi-restaurant-web
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rumi-restaurant-web
  namespace: rumi-test
  annotations:
    # ALB annotations
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:eu-central-1:670079155071:certificate/ba079074-05de-49e4-b8d5-a7a75e6ac82a
    alb.ingress.kubernetes.io/healthcheck-path: /api/health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '15'
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '5'
    alb.ingress.kubernetes.io/healthy-threshold-count: '2'
    alb.ingress.kubernetes.io/unhealthy-threshold-count: '2'
spec:
  ingressClassName: alb
  rules:
  - host: rumirestaurant.ch
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: rumi-restaurant-web
            port:
              number: 80
  - host: www.rumirestaurant.ch
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: rumi-restaurant-web
            port:
              number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rumi-restaurant-web
  namespace: rumi-test
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rumi-restaurant-web
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
