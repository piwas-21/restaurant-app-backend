apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rumi-restaurant-web-ingress
  namespace: default
  labels:
    app: rumi-restaurant-web
  annotations:
    # NGINX Ingress Controller annotations
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    # Security headers (simplified for local development)
    # nginx.ingress.kubernetes.io/configuration-snippet: |
    #   add_header X-Frame-Options "SAMEORIGIN" always;
    #   add_header X-Content-Type-Options "nosniff" always;
spec:
  ingressClassName: nginx
  # Uncomment and modify for SSL termination
  # tls:
  # - hosts:
  #   - rumirestaurant.ch
  #   secretName: rumi-restaurant-web-tls
  rules:
  - host: rumirestaurant.ch  # Replace with your actual domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: rumi-restaurant-web-service
            port:
              number: 80
  # For local development without domain
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: rumi-restaurant-web-service
            port:
              number: 80
