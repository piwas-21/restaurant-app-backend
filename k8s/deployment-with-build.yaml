apiVersion: v1
kind: Namespace
metadata:
  name: rumi-test
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rumi-app-config
  namespace: rumi-test
data:
  NODE_ENV: "production"
  PORT: "3000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rumi-restaurant-web
  namespace: rumi-test
  labels:
    app: rumi-restaurant-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rumi-restaurant-web
  template:
    metadata:
      labels:
        app: rumi-restaurant-web
    spec:
      containers:
      - name: rumi-restaurant
        image: node:20-alpine
        workingDir: /app
        command:
          - sh
          - -c
          - |
            echo "Creating application structure..."
            mkdir -p /app
            cd /app

            # Create a minimal package.json for Next.js
            cat > package.json << 'EOF'
            {
              "name": "rumi-restaurant-web",
              "version": "1.0.0",
              "scripts": {
                "dev": "next dev",
                "build": "next build",
                "start": "next start"
              },
              "dependencies": {
                "next": "^14.0.0",
                "react": "^18.2.0",
                "react-dom": "^18.2.0"
              }
            }
            EOF

            echo "Installing dependencies..."
            npm install

            # Create minimal Next.js app structure
            mkdir -p pages
            cat > pages/index.js << 'EOF'
            export default function Home() {
              return (
                <div style={{ padding: '50px', fontFamily: 'Arial, sans-serif' }}>
                  <h1>🍽️ RUMI Restaurant</h1>
                  <p>Welcome to RUMI Restaurant - Authentic Turkish Cuisine</p>
                  <p>Full application will be deployed soon with proper Docker build.</p>
                  <p style={{ marginTop: '20px', color: '#666' }}>
                    Status: Running on AWS EKS Test Environment
                  </p>
                </div>
              );
            }
            EOF

            mkdir -p pages/api
            cat > pages/api/health.js << 'EOF'
            export default function handler(req, res) {
              res.status(200).json({ status: 'healthy', timestamp: new Date().toISOString() });
            }
            EOF

            echo "Building Next.js..."
            npm run build

            echo "Starting application..."
            npm start
        ports:
        - containerPort: 3000
          protocol: TCP
        envFrom:
        - configMapRef:
            name: rumi-app-config
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: rumi-restaurant-web
  namespace: rumi-test
  labels:
    app: rumi-restaurant-web
spec:
  type: LoadBalancer
  selector:
    app: rumi-restaurant-web
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rumi-restaurant-web
  namespace: rumi-test
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
spec:
  ingressClassName: alb
  rules:
  - host: rumirestaurant.ch
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: rumi-restaurant-web
            port:
              number: 80
  - host: www.rumirestaurant.ch
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: rumi-restaurant-web
            port:
              number: 80
